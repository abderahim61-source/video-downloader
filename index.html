<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بلال للتحميل الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #00b4d8; --secondary-color: #0077b6; --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--card-bg); padding: 15px 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        .ad-container-top { width: 95%; max-width: 728px; min-height: 90px; background: rgba(255, 255, 255, 0.05); margin: 20px auto; border: 1px dashed rgba(255, 255, 255, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 14px; }
        .main-content { flex: 1; max-width: 800px; width: 95%; margin: 0 auto 30px auto; text-align: center; }
        .hero-section { margin: 40px 0; }
        .hero-section h1 { font-size: 32px; margin-bottom: 10px; color: #ffffff; }
        .downloader-box { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-group { display: flex; gap: 10px; background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 50px; border: 2px solid #334155; }
        .input-group input { flex: 1; background: none; border: none; outline: none; color: white; padding: 0 15px; font-size: 16px; }
        .input-group button { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 16px; }
        .status-area { margin-top: 20px; display: none; font-size: 16px; color: var(--primary-color); }
        .result-area { margin-top: 25px; display: none; }
        .download-btn { display: inline-flex; align-items: center; gap: 10px; background: #10b981; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        footer { background-color: var(--card-bg); padding: 20px; text-align: center; font-size: 14px; color: #94a3b8; margin-top: auto; }
    </style>
</head>
<body>
    <header><div class="logo"><i class="fa-solid fa-cloud-arrow-down"></i><span>منصة بلال للتحميل</span></div></header>
    
    <div class="ad-container-top" id="adSlotTop">مساحة إعلانية مخصصة للربح (Adsterra)</div>

    <div class="main-content">
        <section class="hero-section">
            <h1>حمّل فيديوهاتك المفضلة مباشرة</h1>
            <p>سيرفر خاص وسريع للتحميل بجودة عالية وبدون إعلانات مزعجة</p>
        </section>
        <div class="downloader-box">
            <div class="input-group">
                <input type="text" id="videoLink" placeholder="ضع رابط الفيديو هنا...">
                <button id="actionBtn" onclick="processDownload()">ابدأ التحميل</button>
            </div>
            <div class="status-area" id="statusArea"><i class="fa-solid fa-spinner fa-spin"></i> جاري استخراج الرابط المباشر من السيرفر الخاص...</div>
            <div class="result-area" id="resultArea">
                <p style="color: #10b981;"><i class="fa-solid fa-circle-check"></i> جاهز للتحميل!</p>
                <a href="#" id="downloadLink" class="download-btn" download><i class="fa-solid fa-download"></i> اضغط هنا للتحميل المباشر MP4</a>
            </div>
        </div>
    </div>
    <footer><p>&copy; 2026 جميع الحقوق محفوظة لموقع بلال</p></footer>

    <script>
        async function processDownload() {
            const urlInput = document.getElementById('videoLink').value.trim();
            const statusArea = document.getElementById('statusArea');
            const resultArea = document.getElementById('resultArea');
            const downloadLink = document.getElementById('downloadLink');
            const actionBtn = document.getElementById('actionBtn');

            if (!urlInput) { alert("ضع الرابط أولاً!"); return; }
            statusArea.style.display = "block"; resultArea.style.display = "none"; actionBtn.disabled = true;

            try {
                // هاد الرابط غادي يتواصل مع السيرفر ديالنا نيت فـ Vercel
                const response = await fetch(`/api/download?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();
                if (data.url) {
                    statusArea.style.display = "none"; resultArea.style.display = "block";
                    downloadLink.href = data.url;
                } else { alert(data.error || "تعذر جلب الفيديو"); statusArea.style.display = "none"; }
            } catch (e) { alert("خطأ في الاتصال بالسيرفر"); statusArea.style.display = "none"; }
            finally { actionBtn.disabled = false; }
        }
    </script>
</body>
</html>
